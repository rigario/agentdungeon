model:
  default: kimi-k2.5
  provider: ollama-cloud
  base_url: https://ollama.com/v1
toolsets:
- file
agent:
  max_turns: 5
  verbose: false
  reasoning_effort: low
terminal:
  backend: local
  cwd: .
  timeout: 110
  env_passthrough: []
browser:
  enabled: false
checkpoints:
  enabled: false
compression:
  enabled: false
display:
  compact: true
  personality: helpful
  streaming: false
memory:
  memory_enabled: false
approvals:
  mode: 'off'
context:
  engine: lcm
_config_version: 10
fallback_providers:
- provider: kimi-coding
  model: kimi-k2.5
  base_url: https://api.kimi.com/coding
