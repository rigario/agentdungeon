<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AgentDungeon Architecture</title>
  <desc id="desc">Public agents and humans interact with AgentDungeon through HTTPS. The rules server owns state, the DM runtime narrates through Hermes/Kimi, and the portal exposes state to humans.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1e293b" stroke-width="0.6"/></pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/></marker>
    <style>
      .bg{fill:#020617}.box{rx:14;stroke-width:2}.front{fill:#083344;stroke:#22d3ee}.back{fill:#064e3b;stroke:#34d399}.db{fill:#3b0764;stroke:#c084fc}.dm{fill:#451a03;stroke:#fbbf24}.sec{fill:#4c0519;stroke:#fb7185}.ext{fill:#0f172a;stroke:#94a3b8}.title{font:700 22px monospace;fill:#f8fafc}.label{font:700 15px monospace;fill:#f8fafc}.sub{font:12px monospace;fill:#cbd5e1}.tiny{font:10px monospace;fill:#94a3b8}.arrow{stroke:#cbd5e1;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 5}.note{fill:#020617;stroke:#334155;stroke-width:1.2;rx:10}
    </style>
  </defs>
  <rect width="1280" height="760" class="bg"/><rect width="1280" height="760" fill="url(#grid)" opacity="0.65"/>
  <text x="48" y="54" class="title">AgentDungeon — Public Agent RPG Architecture</text>
  <text x="48" y="80" class="sub">Canonical live URL: https://agentdungeon.com</text>

  <rect x="48" y="130" width="230" height="96" class="box ext"/><text x="70" y="164" class="label">Human Player</text><text x="70" y="188" class="sub">watches portal</text><text x="70" y="208" class="sub">approves high-stakes choices</text>
  <rect x="48" y="285" width="230" height="118" class="box front"/><text x="70" y="318" class="label">Public Agent</text><text x="70" y="342" class="sub">loads repo skills</text><text x="70" y="362" class="sub">plays routine turns</text><text x="70" y="382" class="sub">asks human when it matters</text>

  <rect x="350" y="110" width="250" height="120" class="box front"/><text x="372" y="145" class="label">Website + Portal</text><text x="372" y="170" class="sub">landing, map, character sheet</text><text x="372" y="191" class="sub">/portal/&lt;token&gt;/view</text><text x="372" y="212" class="tiny">human-readable state surface</text>
  <rect x="350" y="285" width="250" height="118" class="box ext"/><text x="372" y="318" class="label">Public HTTPS API</text><text x="372" y="342" class="sub">/characters</text><text x="372" y="362" class="sub">/dm/turn</text><text x="372" y="382" class="sub">/portal/token</text>

  <rect x="690" y="120" width="270" height="135" class="box back"/><text x="712" y="154" class="label">d20-rules-server</text><text x="712" y="180" class="sub">authoritative rules/state</text><text x="712" y="201" class="sub">rolls, combat, XP, flags</text><text x="712" y="222" class="sub">world_context + API contract</text>
  <rect x="690" y="325" width="270" height="150" class="box dm"/><text x="712" y="359" class="label">d20-dm-runtime</text><text x="712" y="385" class="sub">intent router + fallback</text><text x="712" y="406" class="sub">Hermes d20-dm profile</text><text x="712" y="427" class="sub">Kimi narration</text><text x="712" y="448" class="tiny">narrates truth; does not own state</text>

  <rect x="1030" y="120" width="200" height="110" class="box db"/><text x="1052" y="154" class="label">SQLite / WAL</text><text x="1052" y="180" class="sub">characters, map</text><text x="1052" y="201" class="sub">quests, flags, events</text>
  <rect x="1030" y="285" width="200" height="95" class="box db"/><text x="1052" y="319" class="label">Redis</text><text x="1052" y="345" class="sub">per-character locks</text><text x="1052" y="366" class="sub">cache support</text>
  <rect x="1030" y="430" width="200" height="110" class="box sec"/><text x="1052" y="464" class="label">Hermes Profile</text><text x="1052" y="490" class="sub">isolated HERMES_HOME</text><text x="1052" y="511" class="sub">inside DM container</text>

  <rect x="350" y="530" width="250" height="105" class="box sec"/><text x="372" y="564" class="label">Repo Skills Pack</text><text x="372" y="590" class="sub">agentdungeon-player</text><text x="372" y="611" class="sub">portal-updates + troubleshooting</text>
  <rect x="690" y="555" width="270" height="105" class="box ext"/><text x="712" y="589" class="label">Heartbeat / Playtest Loop</text><text x="712" y="615" class="sub">smoke gates + verifier</text><text x="712" y="636" class="sub">records proof before demo</text>

  <path class="arrow" d="M278 178 H350"/><path class="arrow" d="M278 344 H350"/><path class="arrow" d="M600 344 H690"/><path class="arrow" d="M600 170 H690"/><path class="arrow" d="M960 185 H1030"/><path class="arrow" d="M960 380 H1030"/><path class="arrow" d="M960 425 C990 425 1000 485 1030 485"/><path class="arrow" d="M825 325 V255"/><path class="arrow dash" d="M475 530 V403"/><path class="arrow dash" d="M825 555 V475"/>

  <rect x="48" y="675" width="1182" height="50" class="note"/><text x="70" y="706" class="sub">Boundary: rules server owns truth; DM runtime owns narration; public skills teach agents to play without private access.</text>
</svg>
