<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map — The Dreaming Hunger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #080810;
      --bg-primary: #0e0e1c;
      --bg-card: #141428;
      --bg-card-hover: #1a1a34;
      --border: #22223e;
      --border-glow: #3a2a6a;
      --text-primary: #e8dcc8;
      --text-secondary: #9a8ea0;
      --text-muted: #5a5068;
      --accent-gold: #c8a040;
      --accent-amber: #d89020;
      --accent-red: #b83838;
      --accent-purple: #7a4a9a;
      --accent-blue: #4870b0;
      --accent-green: #3a7a40;
      --mark-glow: #e85530;
      --mark-tint: rgba(232, 85, 48, 0.08);
      --fog-color: rgba(8, 8, 16, 0.7);
      --fog-heavy: rgba(8, 8, 16, 0.88);
      --font-display: 'Cinzel', 'Georgia', serif;
      --font-body: 'Crimson Text', 'Georgia', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-display);
      color: var(--text-muted);
      font-size: 1.2rem;
    }

    .map-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* Header */
    .map-header {
      text-align: center;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .map-header h1 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-gold);
      letter-spacing: 0.06em;
    }

    .map-header .subtitle {
      color: var(--text-secondary);
      font-style: italic;
      margin-top: 0.3rem;
      font-size: 1rem;
    }

    /* Character bar */
    .char-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .char-bar .char-name {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--accent-gold);
      font-weight: 700;
    }

    .char-bar .char-stat {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .char-bar .char-stat b {
      color: var(--text-secondary);
      font-weight: 600;
    }

    .char-bar .mark-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-left: auto;
      font-family: var(--font-display);
      font-size: 0.85rem;
    }

    .mark-indicator .mark-dots {
      display: flex;
      gap: 4px;
    }

    .mark-indicator .mark-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .mark-indicator .mark-dot.active {
      background: var(--mark-glow);
      box-shadow: 0 0 6px rgba(232, 85, 48, 0.5);
    }

    /* Fronts bar */
    .fronts-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.8rem;
    }

    .fronts-bar .fronts-label {
      font-family: var(--font-display);
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .fronts-bar .portents {
      display: flex;
      gap: 3px;
    }

    .fronts-bar .portent-pip {
      width: 20px;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .fronts-bar .portent-pip.active {
      background: var(--mark-glow);
      box-shadow: 0 0 4px rgba(232, 85, 48, 0.4);
    }

    .fronts-bar .portent-pip.doom {
      background: var(--accent-red);
      box-shadow: 0 0 6px rgba(184, 56, 56, 0.6);
    }

    .fronts-bar .fronts-status {
      color: var(--text-secondary);
      margin-left: auto;
      font-style: italic;
    }

    /* Main layout */
    .map-body {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .map-svg-wrap {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .map-svg-wrap svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Map canvas: subtle atmospheric texture */
    .map-svg-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(58, 122, 64, 0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 60%, rgba(120, 74, 154, 0.03) 0%, transparent 40%);
      pointer-events: none;
      z-index: 1;
    }

    /* Location nodes */
    .loc-node {
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .loc-node.fogged {
      opacity: 0.3;
      cursor: default;
    }

    .loc-node.fogged:hover {
      transform: none;
    }

    .loc-node:not(.fogged) {
      transition: transform 0.15s ease, opacity 0.3s ease;
    }

    .loc-node:not(.fogged):hover {
      transform: scale(1.12);
    }

    .loc-node circle.outer {
      transition: all 0.2s ease;
    }

    .loc-node:not(.fogged):hover circle.outer {
      stroke: var(--accent-gold);
      stroke-width: 3;
    }

    .loc-node.current circle.outer {
      stroke: var(--accent-gold);
      stroke-width: 3;
      filter: drop-shadow(0 0 8px rgba(200, 160, 64, 0.6));
    }

    .loc-node.current .pulse-ring {
      animation: pulse-ring 2.5s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { r: 16; opacity: 0.7; }
      100% { r: 30; opacity: 0; }
    }

    .loc-label {
      font-family: var(--font-display);
      font-size: 8.5px;
      fill: var(--text-secondary);
      text-anchor: middle;
      pointer-events: none;
      letter-spacing: 0.02em;
    }

    .loc-node.current .loc-label {
      fill: var(--accent-gold);
      font-weight: 700;
      font-size: 9px;
    }

    .loc-node.fogged .loc-label {
      fill: var(--text-muted);
      font-style: italic;
    }

    .loc-npc-icons {
      font-size: 7px;
      pointer-events: none;
    }

    /* Edges */
    .edge-line {
      stroke: var(--border);
      stroke-width: 1.5;
      stroke-dasharray: 4 3;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .edge-line.fogged-edge {
      opacity: 0.1;
      stroke-dasharray: 2 4;
    }

    .edge-line.traveled {
      stroke: #3a5a40;
      stroke-width: 2;
      stroke-dasharray: none;
      opacity: 0.6;
    }

    /* Mark overlay on node */
    .mark-aura {
      opacity: 0;
      transition: opacity 0.5s;
    }

    .mark-aura.visible {
      opacity: 0.3;
    }

    /* Fog rectangles */
    .fog-overlay {
      transition: opacity 0.4s ease;
    }

    .fog-overlay.clear {
      opacity: 0;
    }

    /* Side panel */
    .map-panel {
      width: 300px;
      min-width: 300px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      position: sticky;
      top: 1.5rem;
    }

    .map-panel h2 {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--accent-gold);
      margin-bottom: 0.5rem;
    }

    .panel-loc-image {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-card));
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .panel-loc-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      border-radius: 5px;
    }

    .panel-biome {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.75rem;
    }

    .panel-desc {
      color: var(--text-secondary);
      font-size: 0.92rem;
      line-height: 1.65;
      margin-bottom: 1rem;
    }

    .panel-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .stat-box {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      text-align: center;
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--text-primary);
    }

    .panel-npcs {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .panel-npcs h3 {
      font-family: var(--font-display);
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .npc-tag {
      display: inline-block;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      margin: 0.15rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .panel-connections {
      margin-top: 0.75rem;
    }

    .panel-connections h3 {
      font-family: var(--font-display);
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .conn-link {
      display: block;
      color: var(--accent-blue);
      text-decoration: none;
      padding: 0.3rem 0;
      font-size: 0.88rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .conn-link:hover {
      color: var(--accent-gold);
    }

    .conn-link::before {
      content: '\2192 ';
      color: var(--text-muted);
    }

    .conn-link.fogged-link {
      color: var(--text-muted);
      font-style: italic;
    }

    /* Legend */
    .map-legend {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .legend-separator {
      width: 1px;
      height: 14px;
      background: var(--border);
    }

    .legend-item.fog-icon {
      font-style: italic;
    }

    .fog-swatch {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--bg-primary);
      border: 1.5px dashed var(--text-muted);
    }

    /* Toggle bar */
    .toggle-bar {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .toggle-btn {
      font-family: var(--font-display);
      font-size: 0.72rem;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .toggle-btn:hover {
      color: var(--text-secondary);
      border-color: var(--border-glow);
    }

    .toggle-btn.active {
      color: var(--accent-gold);
      border-color: var(--accent-gold);
      background: rgba(200, 160, 64, 0.08);
    }

    /* Navigation */
    .nav-links {
      text-align: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .nav-links a {
      color: var(--accent-blue);
      text-decoration: none;
      font-family: var(--font-display);
      font-size: 0.82rem;
      margin: 0 0.75rem;
    }

    .nav-links a:hover {
      color: var(--accent-gold);
    }

    .error {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--accent-red);
    }

    @media (max-width: 768px) {
      .map-body {
        flex-direction: column;
      }
      .map-panel {
        width: 100%;
        min-width: auto;
        position: static;
      }
      .char-bar {
        flex-wrap: wrap;
      }
      .char-bar .mark-indicator {
        margin-left: 0;
        width: 100%;
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>

<div id="app" class="loading">Reading the map...</div>

<script>
// ============================
// CONFIG — for standalone preview, we embed mock data
// ============================
const STANDALONE = false; // Auto: tries API first, falls back to mock

const API_BASE = window.location.origin;

// Layout positions (x, y in 800x580 viewBox — slightly bigger for breathing room)
const LAYOUT = {

// ============================

const MOCK_LOCATIONS = [
  { id: 'rusty-tankard', name: 'The Rusty Tankard', biome: 'tavern', description: 'A warm, smoky tavern on the edge of town. Del works the bar. Something feels wrong about the way she watches the door.', hostility_level: 0, encounter_threshold: 0, recommended_level: 1, connected_to: ['thornhold','south-road'], image_url: null, npcs: [{id:'npc-del',name:'Del'},{id:'npc-aldric',name:'Aldric'}] },
  { id: 'thornhold', name: 'Thornhold', biome: 'town', description: 'A walled town at the edge of the Whisperwood. The people are scared and the garrison is stretched thin. A statue in the square gleams with strange markings.', hostility_level: 0, encounter_threshold: 0, recommended_level: 1, connected_to: ['rusty-tankard','forest-edge','south-road'], image_url: null, npcs: [{id:'npc-constantine',name:'Constantine'},{id:'npc-ser-maren',name:'Ser Maren'},{id:'npc-marta',name:'Marta'}] },
  { id: 'forest-edge', name: 'Whisperwood Edge', biome: 'forest', description: 'The trees lean inward here. Paths shift overnight. Something ancient watches from between the trunks.', hostility_level: 1, encounter_threshold: 50, recommended_level: 1, connected_to: ['thornhold','deep-forest','cave-entrance'], image_url: null, npcs: [] },
  { id: 'deep-forest', name: 'Deep Whisperwood', biome: 'forest', description: 'The canopy blocks the sky. The air hums. You feel the mark pulse in time with the forest\'s breathing.', hostility_level: 2, encounter_threshold: 60, recommended_level: 2, connected_to: ['forest-edge','moonpetal-glade','cave-entrance'], image_url: null, npcs: [{id:'npc-green-woman',name:'The Green Woman'}] },
  { id: 'moonpetal-glade', name: 'Moonpetal Glade', biome: 'forest', description: 'A ring of standing stones around a split monolith. Moonpetals grow here, faintly luminous, swaying without wind.', hostility_level: 3, encounter_threshold: 10, recommended_level: 2, connected_to: ['deep-forest'], image_url: null, npcs: [] },

  { id: 'cave-depths', name: 'Cave Depths', biome: 'dungeon', description: 'The Bone Gallery. Ancient remains line the walls. The seal is close. The Hunger speaks.', hostility_level: 4, encounter_threshold: 75, recommended_level: 4, connected_to: ['cave-entrance','seal-chamber'], image_url: null, npcs: [{id:'npc-kol',name:'Brother Kol'}] },
  { id: 'seal-chamber', name: 'The Seal Chamber', biome: 'dungeon', description: 'The heart of the binding. Three keys. Three endings. Your choice here shapes the world.', hostility_level: 5, encounter_threshold: 0, recommended_level: 5, connected_to: ['cave-depths'], image_url: null, npcs: [] },

// INIT
// ============================
  async function init() {
    try {
      // Check for portal share token in URL query
      const token = new URLSearchParams(window.location.search).get('token');

      // If no token and not dev mode, show token prompt as non-blocking modal overlay
      if (!token && new URLSearchParams(window.location.search).get('dev') !== 'true') {
        const modal = document.createElement('div');
        modal.id = 'token-modal';
        modal.innerHTML = `

            font-family:var(--font-display);color:var(--text-primary);">

              <p style="margin-bottom:1.5rem;line-height:1.7;">

                Token authentication is required for character-specific view. Enter your token below, or continue to the public world map.

              <div style="display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1rem;">
                <input type="text" id="token-input" placeholder="Paste your d20pt_... token here"
                  style="padding:0.75rem 1rem;border-radius:6px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font-body);font-size:1rem;outline:none;transition:border-color 0.2s;"
                  onfocus="this.style.borderColor='var(--accent-gold)'" onblur="this.style.borderColor='var(--border)'">
                <button onclick="
                  const t = document.getElementById('token-input').value.trim();
                  if (t) window.location.search = '?token=' + encodeURIComponent(t);
                  else alert('Please enter your share token.');
                "
                  style="
                    padding:0.85rem 1.5rem;border-radius:6px;border:none;background:linear-gradient(135deg,var(--accent-gold),var(--accent-amber));color:#080810;font-family:var(--font-display);font-weight:700;cursor:pointer;font-size:1rem;letter-spacing:0.05em;text-transform:uppercase;transition:transform 0.2s,box-shadow 0.2s;"
                  onmouseover="this.style.transform='scale(1.03)';this.style.boxShadow='0 0 12px rgba(200,160,64,0.4)'"
                  onmouseout="this.style.transform='scale(1)';this.style.boxShadow='none'">
                  Enter Token
                </button>
              </div>
              <button id="close-token-modal" onclick="document.getElementById('token-modal').remove();"
                style="
                  padding:0.5rem 1rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-family:var(--font-body);font-size:0.9rem;cursor:pointer;transition:all 0.2s;"
                onmouseover="this.style.borderColor='var(--accent-gold)';this.style.color='var(--accent-gold)'"
                onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-secondary)'">
                Continue to Public Map
              </button>
              <p style="margin-top:1.25rem;font-size:0.8rem;color:var(--text-muted);">
                Tokens are generated by your DM or agent. They remain valid for 7 days by default.
              </p>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
        // Continue to render public map in background
      }   }
      let portalData = null;

      if (token) {
        // Fetch per-character state (includes character, map with fog-of-war history)
        const r = await fetch(`${API_BASE}/portal/${encodeURIComponent(token)}/state`);
        if (!r.ok) throw new Error(`Portal state fetch failed: ${r.status}`);
        portalData = await r.json();
        if (portalData.error) throw new Error(portalData.error || 'Portal error');
      }

      if (portalData && portalData.character && portalData.map) {
        // === TOKEN MODE: use portal state (character history-based fog-of-war) ===
        character = portalData.character;
        currentLocationId = character.current_location_id || portalData.location?.id;
        mark_stage = character.mark_of_dreamer_stage || 0;
        portentStage = portalData.doom_clock?.portents_triggered || 0;

        // Load all world locations from portal payload
        portalData.map.locations.forEach(l => { locations[l.id] = l; });

        // Fog-of-war directly from character event_log history
        visited = new Set(portalData.map.visited_locations || []);
        traveledEdges = new Set();
        (portalData.map.traveled_edges || []).forEach(e => {
          if (e.length === 2) traveledEdges.add(edgeKey(e[0], e[1]));
        });
      } else {
        // === NORMAL MODE (no token): fetch public endpoints only ===
        const r = await fetch(`${API_BASE}/api/map/data`);
        if (!r.ok) throw new Error(`${r.status}`);
        const data = await r.json();
        data.locations.forEach(l => { locations[l.id] = l; });
        currentLocationId = data.current_location || data.locations[0]?.id;

        // Character: default + optional enrichment from /api/characters
        character = { name: 'Adventurer', race: 'Human', class: 'Fighter', level: 2, hp: 16, hp_max: 18, mark_stage: 0, current_location: currentLocationId };
        try {
          const chars = await fetch(`${API_BASE}/api/characters`).then(r => r.json());
          if (chars.characters && chars.characters.length > 0) {
            const c = chars.characters[0];
            character = {
              name: c.name || 'Adventurer',
              race: c.race || 'Human',
              class: c.class_name || c.class || 'Fighter',
              level: c.level || 1,
              hp: c.hit_points || c.hp || 10,
              hp_max: c.hp_max || c.max_hp || 10,
              mark_stage: 0,
              current_location: currentLocationId
            };
          }
        } catch (_) { /* character endpoint may not return expected shape */ }

        // Heuristic visited: current location + immediate connected neighbors
        visited = new Set([currentLocationId]);
        traveledEdges = new Set();
        portentStage = 0;
        const startConns = parseConns(locations[currentLocationId]?.connected_to);
        startConns.forEach(c => {
          visited.add(c);
          traveledEdges.add(edgeKey(currentLocationId, c));
        });
      }

      render();
    } catch (e) {
      // Fallback to mock data for standalone preview
      console.warn('API fetch failed, using mock data:', e.message);
      MOCK_LOCATIONS.forEach(l => { locations[l.id] = l; });
      currentLocationId = MOCK_CHARACTER.current_location;
      character = MOCK_CHARACTER;
      portentStage = MOCK_PORTENT_STAGE;
      visited = MOCK_VISITED;
      traveledEdges = MOCK_TRAVELED_EDGES;
      render();
    }
  }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function edgeKey(a, b) {
  return [a, b].sort().join('|');
}

// ============================
// RENDER
// ============================
function render() {
  const app = document.getElementById('app');
  app.className = '';
  app.innerHTML = `
    <div class="map-container">
      ${buildCharBar()}
      ${buildFrontsBar()}
      <div class="map-body">
        <div class="map-svg-wrap">
          ${buildSVG()}
        </div>
        <div class="map-panel" id="detail-panel">
          ${buildPanel(currentLocationId)}
        </div>
      </div>
      <div class="toggle-bar">
        <button class="toggle-btn ${showFog ? 'active' : ''}" data-toggle="fog">Fog of War</button>
        <button class="toggle-btn ${showNpcs ? 'active' : ''}" data-toggle="npcs">Show NPCs</button>
        <button class="toggle-btn" data-toggle="reveal">Reveal All</button>
      </div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#3a7a40"></div> Safe</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6aaa6a"></div> Low</div>
        <div class="legend-item"><div class="legend-dot" style="background:#aaaa4a"></div> Moderate</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d89020"></div> Dangerous</div>
        <div class="legend-item"><div class="legend-dot" style="background:#cc6633"></div> Deadly</div>
        <div class="legend-item"><div class="legend-dot" style="background:#b83838"></div> Extreme</div>
        <div class="legend-separator"></div>
        <div class="legend-item fog-icon"><div class="fog-swatch"></div> Unexplored</div>
      </div>
      <div class="nav-links">
        <a href="/portal.html">Character Sheet</a>
        <a href="/demo">Demo</a>
        <a href="/docs">API Docs</a>
      </div>
    </div>
  `;

  bindEvents();
}

function buildCharBar() {
  if (!character) return '';
  const markDots = [0,1,2,3].map(i =>
    `<div class="mark-dot ${i < character.mark_stage ? 'active' : ''}"></div>`
  ).join('');

  const markLabel = character.mark_stage === 0 ? 'Unmarked' :
    character.mark_stage === 1 ? 'Stage I' :
    character.mark_stage === 2 ? 'Stage II' :
    character.mark_stage === 3 ? 'Stage III' : 'Scarred';

  return `
    <div class="char-bar">
      <span class="char-name">${esc(character.name)}</span>
      <span class="char-stat"><b>${character.race || ''} ${character.class || ''}</b> Lv.${character.level || 1}</span>
      <span class="char-stat">HP <b>${character.hp || '?'}/${character.hp_max || '?'}</b></span>
      <span class="char-stat">Location: <b>${esc(locations[currentLocationId]?.name || currentLocationId)}</b></span>
      <span class="mark-indicator">
        <span style="color:${character.mark_stage > 0 ? 'var(--mark-glow)' : 'var(--text-muted)'}; font-size:0.75rem">${markLabel}</span>
        <span class="mark-dots">${markDots}</span>
      </span>
    </div>
  `;
}

function buildFrontsBar() {
  const portentNames = ['First Mark','Animals Dying','Undead Walk','Seal Weeps','Breaking Rite','Hunger Speaks','Door Opens','Feast Begins'];
  const pips = portentNames.map((_, i) => {
    let cls = '';
    if (i < portentStage) cls = 'active';
    if (i === 7 && portentStage >= 7) cls = 'doom';
    return `<div class="portent-pip ${cls}" title="${portentNames[i]}"></div>`;
  }).join('');

  const statusText = portentStage === 0 ? 'The Hunger stirs...' :
    portentStage < 4 ? 'The seal weakens.' :
    portentStage < 6 ? 'The dead walk. The seal weeps.' :
    portentStage < 7 ? 'The Door opens. Time is short.' : 'THE FEAST BEGINS.';

  const statusColor = portentStage < 3 ? 'var(--text-secondary)' :
    portentStage < 5 ? 'var(--accent-amber)' : 'var(--mark-glow)';

  return `
    <div class="fronts-bar">
      <span class="fronts-label">Dreaming Hunger</span>
      <span class="portents">${pips}</span>
      <span class="fronts-status" style="color:${statusColor}">${statusText}</span>
    </div>
  `;
}

function isVisited(locId) {
  return visited.has(locId);
}

function isTraveled(a, b) {
  return traveledEdges.has(edgeKey(a, b));
}

function buildSVG() {
  const locs = Object.values(locations);
  const edges = new Set();

  locs.forEach(loc => {
    parseConns(loc.connected_to).forEach(c => {
      edges.add(edgeKey(loc.id, c));
    });
  });

  let svg = `<svg viewBox="0 0 780 570" xmlns="http://www.w3.org/2000/svg">`;

  // Defs
  svg += `<defs>
    <radialGradient id="bg-grad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#12122a"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mark-aura">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;
  svg += `<rect width="780" height="570" fill="url(#bg-grad)"/>`;

  // Terrain hints (very subtle background shapes)
  // Forest region
  svg += `<ellipse cx="560" cy="250" rx="160" ry="130" fill="#0a1a0a" opacity="0.25"/>`;
  // Mountain region  
  svg += `<ellipse cx="90" cy="460" rx="80" ry="70" fill="#0a0a18" opacity="0.2"/>`;
  // Town region
  svg += `<ellipse cx="350" cy="120" rx="70" ry="50" fill="#141418" opacity="0.2"/>`;

  // Draw edges
  edges.forEach(key => {
    const [a, b] = key.split('|');
    const pa = LAYOUT[a];
    const pb = LAYOUT[b];
    if (!pa || !pb) return;

    const isTrav = isTraveled(a, b);
    const bothVisited = isVisited(a) && isVisited(b);
    const fogged = showFog && !bothVisited;

    let cls = 'edge-line';
    if (fogged) cls += ' fogged-edge';
    if (isTrav) cls += ' traveled';

    svg += `<line class="${cls}" x1="${pa.x}" y1="${pa.y}" x2="${pb.x}" y2="${pb.y}"/>`;
  });

  // Draw nodes
  locs.forEach(loc => {
    const pos = LAYOUT[loc.id];
    if (!pos) return;
    const danger = loc.hostility_level || 0;
    const isCurrent = loc.id === currentLocationId;
    const visited_ = isVisited(loc.id);
    const fogged = showFog && !visited_;

    svg += `<g class="loc-node ${isCurrent ? 'current' : ''} ${fogged ? 'fogged' : ''}" data-id="${esc(loc.id)}">`;

    // Mark aura (for locations near current when mark is active)
    if (character && character.mark_stage > 0 && !fogged) {
      // Mark aura radiates outward from current location
      const dist = Math.sqrt((pos.x - (LAYOUT[currentLocationId]?.x || 0)) ** 2 + (pos.y - (LAYOUT[currentLocationId]?.y || 0)) ** 2);
      const auraOpacity = Math.max(0, 0.15 - dist * 0.0005) * (character.mark_stage / 4);
      if (auraOpacity > 0.01) {
        svg += `<circle class="mark-aura ${auraOpacity > 0.02 ? 'visible' : ''}" cx="${pos.x}" cy="${pos.y}" r="40" fill="rgba(232,85,48,${auraOpacity.toFixed(3)})" filter="url(#mark-aura)"/>`;
      }
    }

    // Current pulse
    if (isCurrent) {
      svg += `<circle class="pulse-ring" cx="${pos.x}" cy="${pos.y}" r="16" fill="none" stroke="#c8a040" stroke-width="2"/>`;
    }

    // Outer circle (danger color)
    const dangerStrokes = ['#3a7a40','#6aaa6a','#aaaa4a','#d89020','#cc6633','#b83838'];
    svg += `<circle class="outer" cx="${pos.x}" cy="${pos.y}" r="18" fill="${fogged ? '#0a0a14' : '#0e0e1c'}" stroke="${fogged ? '#1a1a30' : dangerStrokes[danger] || '#2a2a4a'}" stroke-width="${isCurrent ? 3 : 2}"/>`;

    // Inner fill
    svg += `<circle cx="${pos.x}" cy="${pos.y}" r="13" fill="${fogged ? '#0a0a14' : 'var(--bg-card)'}" opacity="${fogged ? 1 : 0.9}"/>`;

    // Biome icon (only if visited)
    if (!fogged) {
      const icon = BIOME_ICONS[loc.biome] || '\u{1F4CD}';
      svg += `<text x="${pos.x}" y="${pos.y + 4}" text-anchor="middle" font-size="13">${icon}</text>`;
    } else {
      // Question mark for fogged
      svg += `<text x="${pos.x}" y="${pos.y + 5}" text-anchor="middle" font-size="11" fill="#1a1a30" font-family="Cinzel">?</text>`;
    }

    // NPC indicators (below node, only if visited and showNpcs)
    if (!fogged && showNpcs && loc.npcs && loc.npcs.length > 0) {
      const npcY = pos.y - 22;
      loc.npcs.forEach((npc, i) => {
        const offsetX = (i - (loc.npcs.length - 1) / 2) * 12;
        svg += `<text class="loc-npc-icons" x="${pos.x + offsetX}" y="${npcY}">\u{1F9D9}\u200D\u2640\uFE0F</text>`;
      });
    }

    // Label
    const labelY = pos.y + 32;
    svg += `<text class="loc-label" x="${pos.x}" y="${labelY}">${esc(fogged ? '???' : loc.name)}</text>`;

    svg += `</g>`;
  });

  svg += `</svg>`;
  return svg;
}

function buildPanel(locId) {
  const loc = locations[locId];
  if (!loc) return '<p class="panel-desc" style="color:var(--text-muted)">Select a location on the map.</p>';

  const visited_ = isVisited(locId);
  const fogged = showFog && !visited_;
  const danger = loc.hostility_level || 0;
  const dangerLabels = ['Safe','Low','Moderate','Dangerous','Deadly','Extreme'];
  const dangerColors = ['#3a7a40','#6aaa6a','#aaaa4a','#d89020','#cc6633','#b83838'];
  const conns = parseConns(loc.connected_to);
  const biomeIcon = BIOME_ICONS[loc.biome] || '\u{1F4CD}';

  if (fogged) {
    return `
      <h2>???</h2>
      <div class="panel-biome">Unexplored</div>
      <div class="panel-desc" style="color:var(--text-muted);font-style:italic">You have not yet traveled to this location. Paths leading here are uncertain.</div>
    `;
  }

  const locImg = loc.image_url || LOC_IMAGES[locId];
  let html = '';
  if (locImg) {
    html += `<div class="panel-loc-image"><img src="${esc(locImg)}" alt="${esc(loc.name)}" loading="lazy"></div>`;
  }
  html += `
    <h2>${biomeIcon} ${esc(loc.name)}</h2>
    <div class="panel-biome">${esc(loc.biome)}</div>
    <div class="panel-desc">${esc(loc.description)}</div>
    <div class="panel-stats">
      <div class="stat-box">
        <div class="stat-label">Danger</div>
        <div class="stat-value" style="color:${dangerColors[danger]}">${dangerLabels[danger] || 'Unknown'}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Rec. Level</div>
        <div class="stat-value">${loc.recommended_level || 1}</div>
      </div>
    </div>
  `;

  if (loc.npcs && loc.npcs.length > 0) {
    html += `<div class="panel-npcs"><h3>NPCs Here</h3>`;
    loc.npcs.forEach(npc => {
      html += `<span class="npc-tag">${esc(npc.name)}</span>`;
    });
    html += `</div>`;
  }

  if (conns.length > 0) {
    html += `<div class="panel-connections"><h3>Paths</h3>`;
    conns.forEach(c => {
      const dest = locations[c];
      const name = dest ? dest.name : c;
      const connVisited = isVisited(c);
      const connFogged = showFog && !connVisited;
      html += `<a class="conn-link ${connFogged ? 'fogged-link' : ''}" data-target="${esc(c)}">${connFogged ? '???' : esc(name)}</a>`;
    });
    html += `</div>`;
  }

  return html;
}

function parseConns(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  try { return JSON.parse(raw); } catch { return raw.split(',').map(s => s.trim()).filter(Boolean); }
}

// ============================
// EVENT BINDING
// ============================
function bindEvents() {
  // Location node clicks
  document.querySelectorAll('.loc-node').forEach(node => {
    node.addEventListener('click', () => {
      const id = node.dataset.id;
      if (showFog && !isVisited(id)) return; // Can't select fogged
      currentLocationId = id;
      updateCurrentNode(id);
      document.getElementById('detail-panel').innerHTML = buildPanel(id);
    });
  });

  // Connection link clicks
  document.querySelectorAll('.conn-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = link.dataset.target;
      if (target && locations[target] && (!showFog || isVisited(target))) {
        currentLocationId = target;
        updateCurrentNode(target);
        document.getElementById('detail-panel').innerHTML = buildPanel(target);
      }
    });
  });

  // Toggle buttons — use event delegation on the toggle-bar so it survives SVG refreshes
  const toggleBar = document.querySelector('.toggle-bar');
  if (toggleBar) {
    toggleBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      const action = btn.dataset.toggle;
      if (action === 'fog') {
        showFog = !showFog;
        btn.classList.toggle('active', showFog);
        refreshSVG();
        document.getElementById('detail-panel').innerHTML = buildPanel(currentLocationId);
      } else if (action === 'npcs') {
        showNpcs = !showNpcs;
        btn.classList.toggle('active', showNpcs);
        refreshSVG();
      } else if (action === 'reveal') {
        // Reveal all locations and disable fog
        Object.keys(locations).forEach(id => visited.add(id));
        showFog = false;
        // Update fog toggle button state
        const fogBtn = document.querySelector('.toggle-btn[data-toggle="fog"]');
        if (fogBtn) fogBtn.classList.remove('active');
        refreshSVG();
        document.getElementById('detail-panel').innerHTML = buildPanel(currentLocationId);
      }
    });
  }
}

function updateCurrentNode(id) {
  document.querySelectorAll('.loc-node').forEach(n => {
    n.classList.toggle('current', n.dataset.id === id);
    // Remove old pulse
    n.querySelectorAll('.pulse-ring').forEach(p => p.remove());
  });
  // Add new pulse
  const node = document.querySelector(`.loc-node[data-id="${id}"]`);
  if (node) {
    const circle = node.querySelector('circle.outer');
    if (circle) {
      const ns = 'http://www.w3.org/2000/svg';
      const pulseCircle = document.createElementNS(ns, 'circle');
      pulseCircle.setAttribute('class', 'pulse-ring');
      pulseCircle.setAttribute('cx', circle.getAttribute('cx'));
      pulseCircle.setAttribute('cy', circle.getAttribute('cy'));
      pulseCircle.setAttribute('r', '16');
      pulseCircle.setAttribute('fill', 'none');
      pulseCircle.setAttribute('stroke', '#c8a040');
      pulseCircle.setAttribute('stroke-width', '2');
      node.insertBefore(pulseCircle, circle);
    }
  }
}

function refreshSVG() {
  const wrap = document.querySelector('.map-svg-wrap');
  if (wrap) {
    wrap.innerHTML = buildSVG();
    // Rebind node clicks
    document.querySelectorAll('.loc-node').forEach(node => {
      node.addEventListener('click', () => {
        const id = node.dataset.id;
        if (showFog && !isVisited(id)) return;
        currentLocationId = id;
        updateCurrentNode(id);
        document.getElementById('detail-panel').innerHTML = buildPanel(id);
      });
    });
  }
}

init();
</script>
</body>
</html>
